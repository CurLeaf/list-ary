<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listary Tools</title>
  <link rel="stylesheet" href="/static/jetbrains-mono.css">
  <script src="/static/tailwind.js"></script>
  <script src="/static/lucide.min.js"></script>
  <script defer src="/static/alpine.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['JetBrains Mono', 'Fira Code', 'Consolas', 'monospace'] },
          colors: {
            term: {
              bg: '#0c0c0c',
              card: '#141414',
              border: '#2a2a2a',
              green: '#00ff9f',
              amber: '#ffb800',
              red: '#ff4444',
              cyan: '#00bfff',
              text: '#e0e0e0',
              dim: '#666666',
              select: '#1a3a2a',
            }
          },
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    * { scrollbar-width: thin; scrollbar-color: #2a2a2a transparent; }
    body { font-family: 'JetBrains Mono', monospace; }

    /* ── Card ── */
    .card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 16px;
      transition: border-color 0.1s ease;
    }
    .card:hover { border-color: #444; }
    .card-static {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 16px;
    }

    /* ── Buttons ── */
    .btn-primary {
      background: #00ff9f;
      color: #0c0c0c;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      border: none; cursor: pointer;
      transition: all 0.1s ease;
      font-family: inherit;
    }
    .btn-primary:hover { background: #0c0c0c; color: #00ff9f; outline: 1px solid #00ff9f; }
    .btn-primary:active { opacity: 0.8; }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #666;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.1s ease;
      font-family: inherit;
    }
    .btn-ghost:hover { border-color: #444; color: #e0e0e0; }
    .btn-ghost:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-danger {
      background: rgba(255,68,68,0.1);
      color: #ff4444;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      border: 1px solid rgba(255,68,68,0.2);
      cursor: pointer;
      transition: all 0.1s ease;
      font-family: inherit;
    }
    .btn-danger:hover { background: rgba(255,68,68,0.2); border-color: #ff4444; }

    .btn-success {
      background: rgba(0,255,159,0.1);
      color: #00ff9f;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      border: 1px solid rgba(0,255,159,0.2);
      cursor: pointer;
      transition: all 0.1s ease;
      font-family: inherit;
    }
    .btn-success:hover { background: rgba(0,255,159,0.2); border-color: #00ff9f; }

    /* ── Input ── */
    .input-field {
      width: 100%;
      background: #0c0c0c;
      border: 1px solid #2a2a2a;
      border-radius: 2px;
      padding: 10px 12px;
      font-size: 13px;
      color: #e0e0e0;
      outline: none;
      transition: border-color 0.1s;
      font-family: 'JetBrains Mono', monospace;
    }
    .input-field::placeholder { color: #444; }
    .input-field:focus { border-color: #00ff9f; }

    /* Hide number input spinners */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

    /* ── Nav ── */
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      width: 100%;
      padding: 8px 12px;
      font-size: 12px; font-weight: 500;
      color: #666;
      cursor: pointer; border: none; background: transparent;
      text-align: left;
      transition: color 0.1s;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .nav-item:hover { color: #e0e0e0; }
    .nav-item.active { color: #00ff9f; }
    .nav-prefix {
      width: 14px;
      text-align: center;
      color: transparent;
      font-weight: 700;
    }
    .nav-item.active .nav-prefix { color: #00ff9f; }
    .nav-icon { width: 16px; height: 16px; flex-shrink: 0; stroke-width: 1.5; }

    /* ── Animation (minimal) ── */
    .fade-in { animation: fadeIn 0.1s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── Modal ── */
    .modal-backdrop { background: rgba(0,0,0,0.7); }
    .modal-panel {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
    }

    /* ── Toast ── */
    .toast-item {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 12px;
      color: #e0e0e0;
      animation: fadeIn 0.1s ease;
    }

    /* ── Filter tab ── */
    .filter-btn {
      padding: 4px 10px;
      font-size: 11px;
      border: 1px solid #2a2a2a;
      border-radius: 2px;
      background: transparent;
      color: #666;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.1s;
    }
    .filter-btn:hover { border-color: #444; color: #e0e0e0; }
    .filter-btn.active { border-color: #00ff9f; color: #00ff9f; background: #1a3a2a; }

    /* ── Mobile ── */
    .mobile-header {
      display: none;
      position: sticky; top: 0; z-index: 30;
      background: #0c0c0c;
      border-bottom: 1px solid #2a2a2a;
      padding: 10px 16px;
      align-items: center; justify-content: space-between;
    }
    .mobile-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 35;
      background: rgba(0,0,0,0.6);
    }
    @media (max-width: 767px) {
      .mobile-header { display: flex; }
      .mobile-overlay.open { display: block; }
      .desktop-sidebar {
        position: fixed; top: 0; left: 0; bottom: 0; z-index: 40;
        transform: translateX(-100%);
        transition: transform 0.15s ease;
        width: 200px !important;
      }
      .desktop-sidebar.open { transform: translateX(0); }
      .desktop-content { padding-left: 0 !important; padding-right: 0 !important; }
      .desktop-content .max-w-3xl { padding-left: 16px; padding-right: 16px; }
      .card, .card-static { padding: 12px; }
      .btn-primary, .btn-ghost, .btn-danger, .btn-success { padding: 8px 14px; font-size: 13px; }
      .nav-item { padding: 12px 14px; font-size: 13px; }
      .modal-panel { max-width: 100% !important; margin: 12px; border-radius: 8px; }
      .filter-btn { padding: 6px 10px; }
      body { -webkit-text-size-adjust: 100%; user-select: auto; }
    }
  </style>
</head>
<body class="bg-term-bg text-term-text min-h-screen font-mono select-none" x-data="app()" x-cloak>

  <!-- Toast -->
  <div class="fixed top-4 right-4 z-50 flex flex-col gap-2" style="max-width:300px;">
    <template x-for="t in toasts" :key="t.id">
      <div class="toast-item"
           x-init="setTimeout(() => toasts = toasts.filter(x => x.id !== t.id), 3000)">
        <span class="mr-2" :class="{
          'text-term-green': t.type==='success',
          'text-term-red': t.type==='error',
          'text-term-cyan': t.type==='info'
        }" x-text="t.type==='success' ? '[OK]' : t.type==='error' ? '[!!]' : '[..]'"></span>
        <span x-text="t.msg"></span>
      </div>
    </template>
  </div>

  <!-- Mobile header -->
  <div class="mobile-header">
    <button class="text-term-dim" @click="mobileNav = !mobileNav" style="background:none;border:none;cursor:pointer;padding:4px;">
      <i data-lucide="menu" style="width:20px;height:20px;"></i>
    </button>
    <span class="text-term-green text-xs font-bold tracking-wider">LISTARY</span>
    <span class="text-term-dim text-[10px]">{{ version }}</span>
  </div>

  <!-- Mobile overlay -->
  <div class="mobile-overlay" :class="mobileNav && 'open'" @click="mobileNav = false"></div>

  <div class="flex h-screen">

    <!-- ─── Sidebar ─── -->
    <nav class="desktop-sidebar w-[190px] bg-term-bg flex flex-col shrink-0 border-r border-term-border" :class="mobileNav && 'open'">
      <div class="px-4 pt-5 pb-4">
        <div class="text-term-green text-xs font-bold tracking-wider">LISTARY</div>
        <div class="text-term-dim text-[10px] mt-0.5">{{ version }}</div>
      </div>
      <div class="border-t border-term-border mx-3 mb-2"></div>

      <div class="flex-1 px-2 space-y-0.5">
        <button class="nav-item" :class="tab === 'kill' && 'active'" @click="switchTab('kill')">
          <span class="nav-prefix">></span>
          <i data-lucide="zap" class="nav-icon"></i> <span x-text="t('nav_kill')"></span>
        </button>
        <button class="nav-item" :class="tab === 'ssh' && 'active'" @click="switchTab('ssh'); loadServers()">
          <span class="nav-prefix">></span>
          <i data-lucide="terminal" class="nav-icon"></i> <span x-text="t('nav_ssh')"></span>
        </button>
        <button class="nav-item" :class="tab === 'sshcfg' && 'active'" @click="switchTab('sshcfg'); loadServers()">
          <span class="nav-prefix">></span>
          <i data-lucide="settings" class="nav-icon"></i> <span x-text="t('nav_sshcfg')"></span>
        </button>
        <button class="nav-item" :class="tab === 'windsurf' && 'active'" @click="switchTab('windsurf'); loadProjects()">
          <span class="nav-prefix">></span>
          <i data-lucide="folder-git-2" class="nav-icon"></i> <span x-text="t('nav_projects')"></span>
        </button>
        <button class="nav-item" :class="tab === 'dashboard' && 'active'" @click="switchTab('dashboard'); loadSessions()">
          <span class="nav-prefix">></span>
          <i data-lucide="layout-dashboard" class="nav-icon"></i> <span x-text="t('nav_board')"></span>
        </button>
        <button class="nav-item" :class="tab === 'settings' && 'active'" @click="switchTab('settings'); loadSettings()">
          <span class="nav-prefix">></span>
          <i data-lucide="sliders-horizontal" class="nav-icon"></i> <span x-text="t('nav_config')"></span>
        </button>
      </div>

      <div class="border-t border-term-border mx-3 mt-2"></div>
      <div class="px-2 pb-3 pt-2">
        <button class="nav-item text-term-red/70 hover:text-term-red" @click="cleanAll()">
          <span class="nav-prefix">></span>
          <i data-lucide="trash-2" class="nav-icon"></i> <span x-text="t('nav_clean')"></span>
        </button>
      </div>
    </nav>

    <!-- ─── Content ─── -->
    <main class="flex-1 bg-term-bg overflow-y-auto desktop-content">
      <div class="max-w-3xl mx-auto px-6 py-6">

        <!-- ═══ KILL PORT ═══ -->
        <div x-show="tab === 'kill'" class="fade-in">
          <h2 class="text-sm font-bold text-term-green mb-5 uppercase tracking-wider" x-text="t('kill_title')"></h2>
          <div class="card-static mb-5">
            <p class="text-xs text-term-dim mb-3" x-text="t('kill_desc')"></p>
            <div class="flex gap-2">
              <input type="number" class="input-field flex-1" placeholder="3000"
                     x-model="killPort" @keydown.enter="doKill()" min="1" max="65535">
              <button class="btn-primary" @click="doKill()" :disabled="!killPort || killing">
                <span x-text="killing ? t('kill_killing') : t('kill_btn')"></span>
              </button>
            </div>
            <div x-show="killResult" class="mt-4 fade-in">
              <template x-if="killResult && killResult.count === 0">
                <p class="text-xs text-term-amber" x-text="t('kill_no_process', killResult.port)"></p>
              </template>
              <template x-if="killResult && killResult.count > 0">
                <div class="space-y-1.5">
                  <p class="text-xs text-term-green" x-text="t('kill_terminated', killResult.count)"></p>
                  <template x-for="k in killResult.killed" :key="k.pid">
                    <div class="flex items-center justify-between bg-term-bg rounded px-3 py-2">
                      <div class="flex items-center gap-3">
                        <span class="text-xs text-term-cyan" x-text="'PID ' + k.pid"></span>
                        <span class="text-xs text-term-text" x-text="k.name"></span>
                      </div>
                      <span class="text-[10px]"
                            :class="k.status === 'killed' ? 'text-term-green' : 'text-term-red'"
                            x-text="k.status === 'killed' ? '[OK]' : '[!!]'"></span>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>

          <!-- Active ports list -->
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
              <h3 class="text-xs font-bold text-term-dim uppercase tracking-wider" x-text="t('kill_listening')"></h3>
              <span x-show="listeningPorts.length" class="text-[10px] text-term-dim" x-text="listeningPorts.length + (portsTotal > 30 ? '/' + portsTotal : '')"></span>
            </div>
            <div class="flex items-center gap-2">
              <input type="text" class="input-field text-xs" style="width:140px;padding:4px 8px;" :placeholder="t('kill_search')"
                     x-model="portSearch">
              <button class="btn-ghost text-[10px]" @click="loadListeningPorts()" :disabled="loadingPorts">
                <span x-text="loadingPorts ? t('kill_loading') : t('kill_refresh')"></span>
              </button>
            </div>
          </div>
          <template x-if="filteredPorts.length === 0 && !loadingPorts">
            <div class="card-static text-center py-8">
              <p class="text-term-dim text-xs">[--] <span x-text="t('kill_no_data')"></span></p>
            </div>
          </template>
          <div class="space-y-1" x-show="filteredPorts.length > 0">
            <template x-for="p in filteredPorts" :key="p.port">
              <div class="card flex items-center justify-between py-2.5 px-3">
                <div class="flex items-center gap-4 flex-1 min-w-0">
                  <span class="text-xs font-bold text-term-cyan w-12 shrink-0" x-text="p.port"></span>
                  <span class="text-xs text-term-text truncate" x-text="p.name"></span>
                  <span class="text-[10px] text-term-dim" x-text="'PID ' + p.pid"></span>
                </div>
                <button class="btn-danger text-[10px]" @click="killPort = String(p.port); doKill().then(() => loadListeningPorts())" x-text="t('kill_btn')">
                </button>
              </div>
            </template>
          </div>
        </div>

        <!-- ═══ SSH CONNECT ═══ -->
        <div x-show="tab === 'ssh'" class="fade-in">
          <h2 class="text-sm font-bold text-term-green mb-5 uppercase tracking-wider" x-text="t('ssh_title')"></h2>
          <template x-if="servers.length === 0">
            <div class="card-static text-center py-10">
              <p class="text-term-dim text-xs mb-3">[--] <span x-text="t('ssh_no_server')"></span></p>
              <button class="btn-primary" @click="switchTab('sshcfg')" x-text="t('ssh_add_server')"></button>
            </div>
          </template>
          <div class="space-y-1.5">
            <template x-for="(s, i) in servers" :key="i">
              <div>
                <div class="card flex items-center justify-between cursor-pointer group" @click="sshConnect(i)">
                  <div class="flex items-center gap-3 flex-1 min-w-0">
                    <span class="text-xs" :class="serverStatus[i] === true ? 'text-term-green' : serverStatus[i] === false ? 'text-term-red' : 'text-term-dim'"
                          x-text="serverStatus[i] === true ? '[ON]' : serverStatus[i] === false ? '[--]' : '[..]'"></span>
                    <div class="min-w-0">
                      <span class="text-xs text-term-text group-hover:text-term-green transition" x-text="s.name"></span>
                      <span class="text-[10px] text-term-dim ml-2">
                        <span x-text="s.host"></span><span x-show="s.port && s.port !== 22" x-text="':' + s.port"></span>
                      </span>
                    </div>
                  </div>
                  <div class="flex items-center gap-2">
                    <button class="btn-ghost text-[10px] opacity-0 group-hover:opacity-100"
                            x-show="s.path"
                            @click.stop="toggleFiles(i)"
                            x-text="fileBrowsers[i] ? t('ssh_hide_files') : t('ssh_show_files')"></button>
                    <span class="text-[10px] text-term-dim opacity-0 group-hover:opacity-100">-></span>
                  </div>
                </div>
                <!-- File Browser -->
                <div x-show="fileBrowsers[i]" x-cloak class="ml-6 mt-1 mb-2 fade-in">
                  <div x-show="(fileBrowsers[i] || {}).loading" class="card-static py-3 text-center">
                    <span class="text-[10px] text-term-dim">[..] <span x-text="t('ssh_files_loading')"></span></span>
                  </div>
                  <div x-show="(fileBrowsers[i] || {}).error && !(fileBrowsers[i] || {}).loading" class="card-static py-3 text-center">
                    <span class="text-[10px] text-term-red">[!!] <span x-text="(fileBrowsers[i] || {}).error"></span></span>
                  </div>
                  <div x-show="!(fileBrowsers[i] || {}).loading && !(fileBrowsers[i] || {}).error">
                    <!-- Toolbar: breadcrumb + back + upload -->
                    <div class="flex items-center justify-between mb-1.5 px-1">
                      <div class="flex items-center gap-0.5 text-[10px] text-term-dim min-w-0 flex-1 overflow-hidden">
                        <span class="text-term-cyan cursor-pointer hover:underline shrink-0"
                              @click="gotoBreadcrumb(i, 0)"
                              x-text="((fileBrowsers[i] || {}).root || '').split('/').pop() || '/'"></span>
                        <template x-for="(seg, idx) in ((fileBrowsers[i] || {}).breadcrumbs || [])" :key="idx">
                          <span class="flex items-center gap-0.5 shrink-0">
                            <span class="text-term-dim">/</span>
                            <span class="text-term-cyan cursor-pointer hover:underline"
                                  @click="gotoBreadcrumb(i, idx + 1)" x-text="seg"></span>
                          </span>
                        </template>
                      </div>
                      <div class="flex items-center gap-1 shrink-0 ml-2">
                        <button class="btn-ghost text-[10px]"
                                x-show="(fileBrowsers[i] || {}).canGoUp" @click="goUp(i)" x-text="'↑ ' + t('ssh_go_up')"></button>
                        <button class="btn-ghost text-[10px]"
                                @click="uploadFile(i)" :disabled="(fileBrowsers[i] || {}).uploading"
                                x-text="(fileBrowsers[i] || {}).uploading ? t('ssh_uploading') : ('↑ ' + t('ssh_upload'))"></button>
                      </div>
                    </div>
                    <!-- File grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-0.5" x-show="((fileBrowsers[i] || {}).files || []).length > 0">
                      <template x-for="f in ((fileBrowsers[i] || {}).files || [])" :key="f.name">
                        <div class="flex items-center gap-1.5 px-2 py-1 rounded hover:bg-term-card group/file"
                             :class="f.type === 'dir' ? 'cursor-pointer' : ''"
                             @click="f.type === 'dir' && enterDir(i, f)">
                          <i :data-lucide="fileIcon(f)" class="shrink-0" :style="'width:14px;height:14px;color:' + fileIconColor(f)"></i>
                          <span class="text-[11px] truncate flex-1" :class="f.type === 'dir' ? 'text-term-cyan' : 'text-term-text'" x-text="f.name"></span>
                          <span class="hidden group-hover/file:flex items-center gap-0.5 shrink-0">
                            <button x-show="f.type === 'file'" class="text-[9px] text-term-dim hover:text-term-green px-0.5" @click.stop="downloadFile(i, f)" title="download">↓</button>
                            <button class="text-[9px] text-term-dim hover:text-term-cyan px-0.5" @click.stop="renameFile(i, f)" title="rename">✎</button>
                            <button class="text-[9px] text-term-dim hover:text-term-red px-0.5" @click.stop="deleteFile(i, f)" title="delete">✕</button>
                          </span>
                        </div>
                      </template>
                    </div>
                    <!-- Empty -->
                    <div x-show="((fileBrowsers[i] || {}).files || []).length === 0" class="card-static py-3 text-center">
                      <span class="text-[10px] text-term-dim">[--] <span x-text="t('ssh_files_empty')"></span></span>
                    </div>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- ═══ SSH CONFIG ═══ -->
        <div x-show="tab === 'sshcfg'" class="fade-in">
          <div class="flex items-center justify-between mb-5">
            <h2 class="text-sm font-bold text-term-green uppercase tracking-wider" x-text="t('sshcfg_title')"></h2>
            <button class="btn-primary" @click="editingServer = {name:'',host:'',port:22,path:'',key:''}; editingIdx = -1; showServerForm = true" x-text="t('sshcfg_add')">
            </button>
          </div>
          <div class="space-y-1.5">
            <template x-for="(s, i) in servers" :key="i">
              <div class="card flex items-center justify-between">
                <div class="flex items-center gap-3 flex-1 min-w-0">
                  <span class="text-term-cyan text-xs" x-text="'[' + (i+1) + ']'"></span>
                  <div class="min-w-0">
                    <span class="text-xs text-term-text" x-text="s.name"></span>
                    <div class="text-[10px] text-term-dim mt-0.5 truncate">
                      <span x-text="s.host"></span>:<span x-text="s.port || 22"></span>
                      <span x-show="s.path" x-text="' -> ' + s.path"></span>
                      <span x-show="s.key" class="text-term-amber"> [KEY]</span>
                    </div>
                  </div>
                </div>
                <div class="flex gap-1.5 shrink-0 ml-3">
                  <button class="btn-ghost text-[10px]" @click="editServer(i)" x-text="t('btn_edit')"></button>
                  <button class="btn-danger text-[10px]" @click="deleteServer(i)" x-text="t('btn_del')"></button>
                </div>
              </div>
            </template>
          </div>
          <template x-if="servers.length === 0">
            <div class="card-static text-center py-10">
              <p class="text-term-dim text-xs">[--] <span x-text="t('sshcfg_no_config')"></span></p>
            </div>
          </template>

          <!-- Modal: Server form -->
          <div x-show="showServerForm" class="fixed inset-0 modal-backdrop flex items-center justify-center z-40">

<script>
document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });
document.addEventListener('alpine:initialized', () => {
  setTimeout(() => lucide.createIcons(), 50);
});
// MutationObserver: 自动检测新增 icon 元素并渲染，替代手动 createIcons 调用
(function() {
  let _iconTimer = null;
  const _refreshIcons = () => {
    clearTimeout(_iconTimer);
    _iconTimer = setTimeout(() => lucide.createIcons(), 30);
  };
  const observer = new MutationObserver((mutations) => {
    for (const m of mutations) {
      if (m.addedNodes.length) { _refreshIcons(); return; }
    }
  });
  document.addEventListener('DOMContentLoaded', () => {
    observer.observe(document.body, { childList: true, subtree: true });
  });
  window._refreshIcons = _refreshIcons;
})();

function app() {
  return {
    tab: 'kill',
    mobileNav: false,
    toasts: [],
    lang: localStorage.getItem('listary_lang') || 'zh',
    killPort: '', killing: false, killResult: null,
    listeningPorts: [], portsTotal: 0, loadingPorts: false, portSearch: '',
    servers: [], serverStatus: {},
    fileBrowsers: {},  // per-server state: { [index]: { files, path, loading, error, subpath, root, canGoUp, uploading, breadcrumbs } }
    showServerForm: false, editingServer: {}, editingIdx: -1, showKeyModal: false, sshKeyInput: '', sshKeyPath: '',
    generatedPubKey: '', generatingKey: false, keyIsNew: false,
    sshTesting: false, sshTestResult: null, sshTestError: '',
    projects: [], showSetupForm: false, settingUp: false, browsing: false,
    setupForm: { path: '', name: '', ide: 'windsurf' }, editingProjectIdx: -1,
    ideProfiles: [],
    sessions: [], replyTexts: {}, ws: null,
    sessionFilter: 'all', showHistory: false,
    settingsForm: { port: 9000, stuck_timeout: 5, session_expire_days: 7, windsurf_path: '', webhook_url: '' },
    autostart: false, autostartLoading: false, webhookTesting: false,

    t(key, ...args) {
      let s = (_i18n[this.lang] || _i18n.zh)[key] || key;
      args.forEach((v, i) => { s = s.replace(`{${i}}`, v); });
      return s;
    },
    setLang(l) {
      this.lang = l;
      localStorage.setItem('listary_lang', l);
      document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
      this.api('POST', '/api/settings', { lang: l }).catch(() => {});
    },

    get filteredPorts() {
      if (!this.portSearch) return this.listeningPorts;
      const q = this.portSearch.toLowerCase();
      return this.listeningPorts.filter(p =>
        String(p.port).includes(q) || p.name.toLowerCase().includes(q)
      );
    },

    get filteredSessions() {
      if (this.sessionFilter === 'all') return this.sessions;
      if (this.sessionFilter === 'waiting') return this.sessions.filter(s => s.status === 'waiting' || s.status === 'completed');
      return this.sessions.filter(s => s.status === this.sessionFilter);
    },

    get completedSessions() {
      return this.sessions.filter(s => s.status === 'executing' || s.status === 'cancelled');
    },

    get filteredGroupedSessions() {
      const g = {};
      this.filteredSessions.forEach(s => { (g[s.project] = g[s.project] || []).push(s); });
      return g;
    },

    init() {
      document.documentElement.lang = this.lang === 'zh' ? 'zh-CN' : 'en';
      this.connectWS(); this.loadListeningPorts(); this.loadIdeProfiles();
    },

    switchTab(t) {
      this.tab = t;
      this.mobileNav = false;
      if (t === 'kill') this.loadListeningPorts();
    },

    toast(msg, type = 'success') {
      this.toasts.push({ id: Date.now(), msg, type });
    },

    async api(method, url, body = null) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(url, opts);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    },

    async loadListeningPorts() {
      this.loadingPorts = true;
      try {
        const r = await this.api('GET', '/api/listening-ports');
        this.listeningPorts = r.ports;
        this.portsTotal = r.total;
      } catch (e) { /* ignore */ }
      this.loadingPorts = false;
    },

    async doKill() {
      if (!this.killPort) return;
      this.killing = true; this.killResult = null;
      try {
        this.killResult = await this.api('POST', '/api/kill-port', { port: parseInt(this.killPort) });
        this.toast(this.killResult.count > 0 ? this.t('toast_killed', this.killResult.count) : this.t('toast_no_listen', this.killPort),
          this.killResult.count > 0 ? 'success' : 'info');
      } catch (e) { this.toast(e.message, 'error'); }
      this.killing = false;
    },

    async loadServers() {
      try { this.servers = await this.api('GET', '/api/servers'); } catch (e) { this.toast(e.message, 'error'); }
      this.pingServers();
    },
    async pingServers() {
      try {
        const r = await this.api('GET', '/api/servers/ping');
        const s = {}; r.status.forEach((v, i) => s[i] = v);
        this.serverStatus = s;
      } catch (e) { /* ignore */ }
    },
    async sshConnect(i) {
      const fb = this.fileBrowsers[i];
      const body = (fb && fb.subpath) ? { subpath: fb.subpath } : {};
      try { const r = await this.api('POST', `/api/ssh-connect/${i}`, body); this.toast(this.t('toast_connected', r.server)); }
      catch (e) { this.toast(e.message, 'error'); }
    },
    async openKeyModal() {
      this.sshKeyPath = '';
      this.sshKeyInput = '';
      this.generatedPubKey = '';
      this.keyIsNew = false;
      this.sshTestResult = null;
      this.sshTestError = '';
      this.showKeyModal = true;
      this.generatingKey = true;
      try {
        const r = await this.api('POST', '/api/ssh-key/ensure', {
          server_name: this.editingServer.name || 'default'
        });
        this.editingServer.key = r.path;
        this.sshKeyPath = r.path;
        this.generatedPubKey = r.public_key;
        this.keyIsNew = r.generated;
        // 自动复制公钥到剪贴板
        try { await navigator.clipboard.writeText(r.public_key); } catch (e) {}
        this.toast(r.generated ? this.t('toast_key_generated') : this.t('toast_pubkey_copied'), 'success');
      } catch (e) { this.toast(e.message, 'error'); }
      this.generatingKey = false;
      this.$nextTick(() => window._refreshIcons && window._refreshIcons());
    },
    async copyPubKey() {
      try {
        await navigator.clipboard.writeText(this.generatedPubKey);
        this.toast(this.t('toast_pubkey_copied'), 'success');
      } catch (e) { this.toast(e.message, 'error'); }
    },
    async testSshConnection() {
      if (!this.editingServer.host) {
        this.toast(this.t('ssh_test_no_host'), 'error');
        return;
      }
      this.sshTesting = true;
      this.sshTestResult = null;
      this.sshTestError = '';
      try {
        const r = await this.api('POST', '/api/ssh-test', {
          host: this.editingServer.host,
          port: this.editingServer.port || 22,
          key: this.sshKeyPath,
        });
        this.sshTestResult = r.connected;
        this.sshTestError = r.error || '';
      } catch (e) {
        this.sshTestResult = false;
        this.sshTestError = e.message;
      }
      this.sshTesting = false;
    },
    async openKeyDir() {
      try { await this.api('GET', '/api/ssh-key/open-dir'); }
      catch (e) { this.toast(e.message, 'error'); }
    },
    editServer(i) {
      this.editingServer = { ...this.servers[i] };
      this.editingIdx = i;
      this.showServerForm = true;
    },
    async saveServer() {
      try {
        let r;
        if (this.editingIdx >= 0) { r = await this.api('PUT', `/api/servers/${this.editingIdx}`, this.editingServer); this.toast(this.t('toast_server_updated')); }
        else { r = await this.api('POST', '/api/servers', this.editingServer); this.toast(this.t('toast_server_added')); }
        this.servers = r.servers; this.showServerForm = false;
      } catch (e) { this.toast(e.message, 'error'); }
    },
    async deleteServer(i) {
      if (!confirm(this.t('confirm_delete_server', this.servers[i].name))) return;
      try { const r = await this.api('DELETE', `/api/servers/${i}`); this.servers = r.servers; this.toast(this.t('toast_deleted', r.removed)); }
      catch (e) { this.toast(e.message, 'error'); }
    },
    _initBrowser(i) {
      return { files: [], path: '', loading: false, error: '', subpath: '', root: '', canGoUp: false, uploading: false, breadcrumbs: [] };
    },
    async toggleFiles(i) {
      if (this.fileBrowsers[i]) {
        const copy = { ...this.fileBrowsers }; delete copy[i]; this.fileBrowsers = copy;
        return;
      }
      this.fileBrowsers = { ...this.fileBrowsers, [i]: this._initBrowser(i) };
      await this.loadRemoteFiles(i, '');
    },
    async loadRemoteFiles(serverIdx, subpath) {
      const fb = this.fileBrowsers[serverIdx] || this._initBrowser(serverIdx);
      fb.files = []; fb.error = ''; fb.loading = true;
      this.fileBrowsers = { ...this.fileBrowsers, [serverIdx]: { ...fb } };
      try {
        const params = subpath ? `?subpath=${encodeURIComponent(subpath)}` : '';
        const r = await this.api('GET', `/api/servers/${serverIdx}/files${params}`);
        fb.files = r.files || [];
        fb.path = r.path || '';
        fb.subpath = r.subpath || '';
        fb.root = r.root || '';
        fb.canGoUp = r.can_go_up || false;
        fb.breadcrumbs = fb.subpath ? fb.subpath.split('/') : [];
      } catch (e) { fb.error = e.message; }
      fb.loading = false;
      this.fileBrowsers = { ...this.fileBrowsers, [serverIdx]: { ...fb } };
      this.$nextTick(() => window._refreshIcons && window._refreshIcons());
    },
    async enterDir(serverIdx, f) {
      if (f.type !== 'dir') return;
      const fb = this.fileBrowsers[serverIdx];
      if (!fb) return;
      const newSub = fb.subpath ? `${fb.subpath}/${f.name}` : f.name;
      await this.loadRemoteFiles(serverIdx, newSub);
    },
    async goUp(serverIdx) {
      const fb = this.fileBrowsers[serverIdx];
      if (!fb || !fb.canGoUp) return;
      const parts = fb.subpath.split('/');
      parts.pop();
      await this.loadRemoteFiles(serverIdx, parts.join('/'));
    },
    async gotoBreadcrumb(serverIdx, depth) {
      const fb = this.fileBrowsers[serverIdx];
      if (!fb) return;
      const parts = fb.breadcrumbs.slice(0, depth);
      await this.loadRemoteFiles(serverIdx, parts.join('/'));
    },
    async uploadFile(serverIdx) {
      const input = document.createElement('input');
      input.type = 'file';
      input.multiple = true;
      input.onchange = async () => {
        const fb = this.fileBrowsers[serverIdx];
        if (!fb) return;
        fb.uploading = true;
        this.fileBrowsers = { ...this.fileBrowsers, [serverIdx]: { ...fb } };
        for (const f of input.files) {
          const fd = new FormData();
          fd.append('file', f);
          fd.append('subpath', fb.subpath);
          try {
            const res = await fetch(`/api/servers/${serverIdx}/upload`, {
              method: 'POST', body: fd,
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            this.toast(this.t('ssh_upload_ok', f.name), 'success');
          } catch (e) {
            this.toast(this.t('ssh_upload_fail', e.message), 'error');
          }
        }
        fb.uploading = false;
        this.fileBrowsers = { ...this.fileBrowsers, [serverIdx]: { ...fb } };
        await this.loadRemoteFiles(serverIdx, fb.subpath);
      };
      input.click();
    },
    async downloadFile(serverIdx, f) {
      const fb = this.fileBrowsers[serverIdx];
      if (!fb) return;
      const params = new URLSearchParams({ subpath: fb.subpath || '', filename: f.name });
      window.open(`/api/servers/${serverIdx}/download?${params}`, '_blank');
    },
    async deleteFile(serverIdx, f) {
      if (!confirm(`${this.t('confirm_delete_file', f.name)}`)) return;
      const fb = this.fileBrowsers[serverIdx];
      if (!fb) return;
      try {
        const params = new URLSearchParams({ subpath: fb.subpath || '', filename: f.name });
        await this.api('DELETE', `/api/servers/${serverIdx}/files?${params}`);
        this.toast(this.t('toast_file_deleted', f.name));
        await this.loadRemoteFiles(serverIdx, fb.subpath);
      } catch (e) { this.toast(e.message, 'error'); }
    },
    async renameFile(serverIdx, f) {
      const newName = prompt(this.t('prompt_rename', f.name), f.name);
      if (!newName || newName === f.name) return;
      const fb = this.fileBrowsers[serverIdx];
      if (!fb) return;
      try {
        await this.api('POST', `/api/servers/${serverIdx}/rename`, {
          subpath: fb.subpath || '', old_name: f.name, new_name: newName,
        });
        this.toast(this.t('toast_file_renamed', f.name, newName));
        await this.loadRemoteFiles(serverIdx, fb.subpath);
      } catch (e) { this.toast(e.message, 'error'); }
    },
    fileIcon(f) {
      if (f.type === 'dir') return 'folder';
      const ext = (f.name.split('.').pop() || '').toLowerCase();
      const map = {
        js:'file-code-2', ts:'file-code-2', jsx:'file-code-2', tsx:'file-code-2',
        py:'file-code-2', rb:'file-code-2', go:'file-code-2', rs:'file-code-2',
        java:'file-code-2', c:'file-code-2', cpp:'file-code-2', h:'file-code-2',
        cs:'file-code-2', php:'file-code-2', sh:'file-code-2', bat:'file-code-2',
        vue:'file-code-2', svelte:'file-code-2', dart:'file-code-2',
        html:'file-code-2', css:'file-code-2', scss:'file-code-2', less:'file-code-2',
        json:'file-json', yaml:'file-text', yml:'file-text', toml:'file-text',
        xml:'file-code-2', sql:'file-text',
        md:'file-text', txt:'file-text', log:'file-text', csv:'file-text',
        ini:'file-text', cfg:'file-text', conf:'file-text', env:'file-text',
        png:'image', jpg:'image', jpeg:'image', gif:'image', svg:'image',
        bmp:'image', webp:'image', ico:'image',
        zip:'archive', tar:'archive', gz:'archive', rar:'archive',
        '7z':'archive', bz2:'archive',
        mp3:'music', wav:'music', flac:'music', ogg:'music',
        mp4:'video', avi:'video', mkv:'video', mov:'video',
        pdf:'file-text', doc:'file-text', docx:'file-text', xls:'file-text', xlsx:'file-text',
        lock:'file-lock-2',
      };
      return map[ext] || 'file';
    },
    fileIconColor(f) {
      if (f.type === 'dir') return '#00bfff';
      const ext = (f.name.split('.').pop() || '').toLowerCase();
      const colors = {
        js:'#ffb800', ts:'#00bfff', jsx:'#00bfff', tsx:'#00bfff',
        py:'#00ff9f', json:'#ffb800', md:'#666',
        html:'#ff4444', css:'#00bfff', vue:'#00ff9f',
        png:'#ff79c6', jpg:'#ff79c6', jpeg:'#ff79c6', gif:'#ff79c6', svg:'#ff79c6',
        sh:'#00ff9f', yml:'#ff4444', yaml:'#ff4444',
        lock:'#666',
      };
      return colors[ext] || '#666';
    },

    async loadIdeProfiles() {
      try { this.ideProfiles = await this.api('GET', '/api/ide-profiles'); } catch (e) {}
    },
    async loadProjects() {
      try { this.projects = await this.api('GET', '/api/projects'); } catch (e) { this.toast(e.message, 'error'); }
    },
    editProject(i) {
      this.editingProjectIdx = i;
      this.setupForm = { path: this.projects[i].path, name: this.projects[i].name, ide: this.projects[i].ide || 'windsurf' };
      this.showSetupForm = true;
    },
    async updateProject() {
      this.settingUp = true;
      try {
        const i = this.editingProjectIdx;
        await this.api('DELETE', `/api/projects/${i}`);
        const r = await this.api('POST', '/api/projects/setup', this.setupForm);
        this.projects = r.projects; this.showSetupForm = false;
        this.setupForm = { path: '', name: '', ide: 'windsurf' }; this.editingProjectIdx = -1;
        this.toast(this.t('toast_project_updated', r.project));
      } catch (e) { this.toast(e.message, 'error'); }
      this.settingUp = false;
    },
    async browseFolder() {
      this.browsing = true;
      try {
        const r = await this.api('GET', '/api/browse-folder');
        if (r.ok && r.path) {
          this.setupForm.path = r.path.replace(/\//g, '\\');
          if (!this.setupForm.name) {
            this.setupForm.name = r.path.split(/[\/\\]/).pop() || '';
          }
        }
      } catch (e) { this.toast(e.message, 'error'); }
      this.browsing = false;
    },
    async setupProject() {
      this.settingUp = true;
      try {
        const r = await this.api('POST', '/api/projects/setup', this.setupForm);
        this.projects = r.projects; this.showSetupForm = false;
        this.setupForm = { path: '', name: '', ide: 'windsurf' }; this.editingProjectIdx = -1;
        this.toast(this.t('toast_project_configured', r.project));
      } catch (e) { this.toast(e.message, 'error'); }
      this.settingUp = false;
    },
    async openWindsurf(i) {
      try { const r = await this.api('POST', `/api/projects/${i}/open`); this.toast(this.t('toast_opened', r.project)); }
      catch (e) { this.toast(e.message, 'error'); }
    },
    async reinjectProject(i) {
      try { const r = await this.api('POST', `/api/projects/${i}/reinject`); this.toast(`[OK] ${r.project} workflows updated`); }
      catch (e) { this.toast(e.message, 'error'); }
    },
    async removeProject(i) {
      if (!confirm(this.t('confirm_remove_project', this.projects[i].name))) return;
      try { const r = await this.api('DELETE', `/api/projects/${i}`); this.projects = r.projects; this.toast(this.t('toast_removed', r.removed)); }
      catch (e) { this.toast(e.message, 'error'); }
    },

    async loadSessions() {
      try { this.sessions = await this.api('GET', '/api/sessions'); } catch (e) {}
    },
    exportSessions(fmt) {
      window.open(`/api/sessions/export?fmt=${fmt}`, '_blank');
    },
    _wsDelay: 1000,
    connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      this.ws = new WebSocket(`${proto}//${location.host}/ws`);
      this.ws.onopen = () => { this._wsDelay = 1000; };
      this.ws.onmessage = (e) => {
        const d = JSON.parse(e.data);
        if (d.type === 'init' && d.sessions) {
          this.sessions = d.sessions;
        } else if (d.type === 'session_updated' && d.session) {
          const idx = this.sessions.findIndex(s => s.session_id === d.session_id);
          if (idx >= 0) this.sessions.splice(idx, 1, d.session);
          else this.sessions.unshift(d.session);
          this.toast(this.t('toast_session_updated', d.session_id.slice(0, 8) + '...'), 'info');
        } else if (d.type === 'session_deleted') {
          this.sessions = this.sessions.filter(s => s.session_id !== d.session_id);
        } else if (d.type === 'sessions_deleted' && d.session_ids) {
          const delSet = new Set(d.session_ids);
          this.sessions = this.sessions.filter(s => !delSet.has(s.session_id));
        } else if (d.type === 'all_cleaned') {
          this.sessions = [];
        } else if (d.sessions) {
          this.sessions = d.sessions;
        }
        };
      this.ws.onclose = () => {
        setTimeout(() => this.connectWS(), this._wsDelay);
        this._wsDelay = Math.min(this._wsDelay * 1.5, 30000);
      };
    },
    async quickReply(sid, text) {
      try { await this.api('POST', `/api/reply/${sid}`, { reply: text }); this.toast(this.t('toast_reply_sent')); }
      catch (e) { this.toast(e.message, 'error'); }
    },
    async sendReply(sid) {
      const text = this.replyTexts[sid]; if (!text) return;
      try { await this.api('POST', `/api/reply/${sid}`, { reply: text }); this.replyTexts[sid] = ''; this.toast(this.t('toast_reply_sent')); }
      catch (e) { this.toast(e.message, 'error'); }
    },
    async cancelSession(sid) {
      try { await this.api('POST', `/api/reply/${sid}`, { reply: '[CANCEL]' }); this.toast(this.t('toast_cancelled')); }
      catch (e) { this.toast(e.message, 'error'); }
    },
    async markNormal(sid) {
      try { await this.api('PATCH', `/api/sessions/${sid}`, { status: 'executing' }); this.toast(this.t('toast_fixed')); }
      catch (e) { this.toast(e.message, 'error'); }
    },
    async copyContext(sid) {
      try { const r = await this.api('GET', `/api/sessions/${sid}/context`); await navigator.clipboard.writeText(r.context); this.toast(this.t('toast_copied')); }
      catch (e) { this.toast(e.message, 'error'); }
    },
    async deleteSession(sid) {
      try { await this.api('DELETE', `/api/sessions/${sid}`); this.toast(this.t('toast_closed')); }
      catch (e) { this.toast(e.message, 'error'); }
    },
    async cleanAll() {
      if (!confirm(this.t('confirm_clean'))) return;
      try { const r = await this.api('DELETE', '/api/sessions'); this.sessions = []; this.toast(this.t('toast_cleaned', r.cleaned)); }
      catch (e) { this.toast(e.message, 'error'); }
    },

    async loadSettings() {
      try {
        this.settingsForm = await this.api('GET', '/api/settings');
        if (this.settingsForm.lang && this.settingsForm.lang !== this.lang) {
          this.setLang(this.settingsForm.lang);
        }
      } catch (e) {}
      try { const r = await this.api('GET', '/api/autostart'); this.autostart = r.enabled; } catch (e) {}
    },
    async toggleAutostart() {
      this.autostartLoading = true;
      try {
        const r = await this.api('POST', '/api/autostart', { enabled: !this.autostart });
        this.autostart = r.enabled;
        this.toast(r.enabled ? this.t('toast_autostart_on') : this.t('toast_autostart_off'));
      } catch (e) { this.toast(e.message, 'error'); }
      this.autostartLoading = false;
    },
    async testWebhook() {
      this.webhookTesting = true;
      try {
        const r = await this.api('POST', '/api/webhook/test', { url: this.settingsForm.webhook_url });
        this.toast(r.ok ? this.t('toast_webhook_ok') : (r.error || this.t('toast_webhook_fail')), r.ok ? 'success' : 'error');
      } catch (e) { this.toast(e.message, 'error'); }
      this.webhookTesting = false;
    },
    async saveSettingsForm() {
      try { await this.api('POST', '/api/settings', this.settingsForm); this.toast(this.t('toast_settings_saved')); }
      catch (e) { this.toast(e.message, 'error'); }
    },
  };
}
</script>
</body>
</html>
